<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1435"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007bff"/>
      <stop offset="100%" style="stop-color:#6610f2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative gradient orb left -->
  <ellipse cx="120" cy="315" rx="220" ry="220" fill="#007bff" opacity="0.07"/>
  <!-- Decorative gradient orb right -->
  <ellipse cx="1080" cy="315" rx="180" ry="180" fill="#6610f2" opacity="0.07"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- RAGtional brand name -->
  <text x="600" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="800" text-anchor="middle" fill="white" letter-spacing="-2">
    <tspan fill="#007bff">RAG</tspan><tspan fill="white">tional</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" text-anchor="middle" fill="#94a3b8" letter-spacing="1">
    Software · AI · Cloud Solutions
  </text>

  <!-- Divider -->
  <rect x="480" y="340" width="240" height="2" fill="url(#accent)" opacity="0.6" rx="1"/>

  <!-- Service pills -->
  <g transform="translate(600, 410)">
    <!-- Web Development -->
    <rect x="-500" y="-22" width="225" height="44" rx="22" fill="rgba(0,123,255,0.15)" stroke="#007bff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="-387" y="6" font-family="system-ui, sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#60a5fa">Web Development</text>

    <!-- Mobile -->
    <rect x="-255" y="-22" width="190" height="44" rx="22" fill="rgba(102,16,242,0.15)" stroke="#6610f2" stroke-width="1" stroke-opacity="0.4"/>
    <text x="-160" y="6" font-family="system-ui, sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#a78bfa">Mobile Apps</text>

    <!-- Salesforce -->
    <rect x="-45" y="-22" width="195" height="44" rx="22" fill="rgba(0,123,255,0.15)" stroke="#007bff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="52" y="6" font-family="system-ui, sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#60a5fa">Salesforce</text>

    <!-- AI Agents -->
    <rect x="170" y="-22" width="180" height="44" rx="22" fill="rgba(102,16,242,0.15)" stroke="#6610f2" stroke-width="1" stroke-opacity="0.4"/>
    <text x="260" y="6" font-family="system-ui, sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#a78bfa">AI Agents</text>
  </g>

  <!-- Bottom domain -->
  <text x="600" y="580" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle" fill="#475569" letter-spacing="1">
    ragtional.com · EN / ES
  </text>
</svg>
